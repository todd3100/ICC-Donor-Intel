[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm install", "npm --prefix client install", "npm --prefix server install"]

[phases.build]
# Note: we intentionally do NOT run `prisma db push` at build time.
# Railway's internal Postgres network is only reachable at runtime, not during
# the build phase, so the schema sync happens at server startup (see
# server/index.js). Build-time we just generate the Prisma client and build
# the React bundle.
cmds = [
  "npm --prefix server run prisma:generate",
  "npm --prefix client run build"
]

[start]
cmd = "node server/index.js"